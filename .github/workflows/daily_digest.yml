name: paper-tracker-weekly-digest

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Fetch papers from last N days"
        required: false
        default: "7"
      top_n:
        description: "Top N papers in report"
        required: false
        default: "20"
  schedule:
    - cron: "0 1 * * 1"

permissions:
  contents: write

jobs:
  run-weekly-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: >
          python -m src.main
          --days-back ${{ github.event.inputs.days_back || '7' }}
          --top-n ${{ github.event.inputs.top_n || '20' }}

      - name: Locate generated report
        id: report
        shell: bash
        run: |
          REPORT_PATH="$(ls -1 outputs/daily/*.md | sort | tail -n 1)"
          REPORT_FILE="$(basename "$REPORT_PATH")"
          REPORT_DATE="${REPORT_FILE%.md}"
          RELEASE_TAG="weekly-report-${REPORT_DATE}"
          RELEASE_TITLE="Paper Tracker Weekly Report - ${REPORT_DATE}"

          echo "report_path=${REPORT_PATH}" >> "$GITHUB_OUTPUT"
          echo "report_file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"
          echo "report_date=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Upload reports
        uses: actions/upload-artifact@v6
        with:
          name: weekly-reports
          path: outputs/daily/*.md

      - name: Create or update weekly release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.report.outputs.release_tag }}"
          TITLE="${{ steps.report.outputs.release_title }}"
          REPORT="${{ steps.report.outputs.report_path }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$REPORT"
            gh release upload "$TAG" "$REPORT" --clobber
          else
            gh release create "$TAG" "$REPORT" --title "$TITLE" --notes-file "$REPORT"
          fi
