name: paper-tracker-daily-digest

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Fetch papers from last N days"
        required: false
        default: "7"
      top_n:
        description: "Top N papers in report"
        required: false
        default: "10"
  schedule:
    - cron: "30 1 * * *"

jobs:
  run-daily-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: >
          python -m src.main
          --days-back ${{ github.event.inputs.days_back || '7' }}
          --top-n ${{ github.event.inputs.top_n || '10' }}

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: outputs/daily/*.md

